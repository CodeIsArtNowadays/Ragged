<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fast Chat Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f4f4f9;
      font-family: Roboto, sans-serif;
    }

    /* Общий контейнер для чата и формы */
    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 450px;
      height: 400px; /* Фиксированная высота для скролла сообщений */
      background: #ffffff;
      border: 2px solid #ccc;
      border-radius: 8px;
      overflow: hidden;
    }

    /* Список сообщений чата */
    .chat-output {
      flex: 1;
      list-style: none;
      padding: 16px;
      overflow-y: auto; /* Полоса прокрутки при заполнении чата */
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Стили для элементов списка (li) */
    .chat-output li {
      padding: 10px 14px;
      font-size: 15px;
      color: #333333;
      background-color: #f1f1f4;
      border: 1px solid #e4e4e7;
      border-radius: 6px;
      word-break: break-word;
    }

    /* Форма ввода (прижата к низу) */
    .fast-form {
      display: flex;
      width: 100%;
      padding: 16px;
      background-color: #ffffff;
      border-top: 2px solid #ccc;
    }

    .fast-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #ccc;
      border-right: none; 
      border-top-left-radius: 6px;
      border-bottom-left-radius: 6px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .fast-input:focus {
      border-color: #0066cc;
    }

    /* Submit Button */
    .fast-btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      background-color: #0066cc;
      border: 2px solid #0066cc;
      border-top-right-radius: 6px;
      border-bottom-right-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }
    .fast-btn:hover {
      background-color: #0052a3;
      border-color: #0052a3;
    }
  </style>
</head>
<body>

  <div class="chat-container">
    <ul class="chat-output" id="chatOutput">

    </ul>
    <form class="fast-form" id="chatForm" onsubmit="sendMessage">
      <input type="text" class="fast-input" id="chatInput" placeholder="Enter your message..." required>
      <button type="submit" class="fast-btn">Submit</button>
    </form>
    <form class="fast-form" id="authForm" onsubmit="sendAuth">
      <input type="text" class="fast-input" id="authInput" placeholder="Enter your token..." required>
      <button type="submit" class="fast-btn">Auth</button>
    </form>
  </div>

</body>
</html>
